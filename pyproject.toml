[tool.ruff]
target-version = "py312"

exclude = [
    ".git",
    ".github",
    "venv",
    "__pycache__",
    "build",
    "dist",
    "migrations",
]

line-length = 88

[tool.ruff.lint]
select = ["E", "F", "W"]
ignore = []


[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "core.settings" 
python_files = ["tests.py", "test_*.py", "*_tests.py"]