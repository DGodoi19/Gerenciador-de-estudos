{% extends 'estudos/base.html' %}
{% load static %}

{% block content %}
<main class="container">
    <section class="form-section">
        <div class="form-container">
            <h2>Editar Trilha: {{ trilha.nomeDaTrilha }}</h2>
            <form method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label>Nome da Trilha</label>
                    <input type="text" name="nomeDaTrilha" value="{{ trilha.nomeDaTrilha }}" required>
                </div>
                <div class="form-group">
                    <label>Semestre</label>
                    <input type="number" name="semestre" value="{{ trilha.semestre }}" min="1" max="10" required>
                </div>
                <div class="form-group">
                    <label>Descrição</label>
                    <textarea name="descricao" rows="5" required>{{ trilha.descricao }}</textarea>
                </div>
                <button type="submit" class="btn-primary">Salvar Alterações</button>
                <div style="text-align: center; margin-top: 15px;">
                    <a href="{% url 'index' %}" style="color: var(--text-muted); text-decoration: none;">Cancelar</a>
                </div>
            </form>
        </div>
    </section>
</main>
{% endblock %}
