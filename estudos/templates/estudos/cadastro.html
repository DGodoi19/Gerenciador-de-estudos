{% extends 'estudos/base.html' %}
{% load static %}

{% block content %}
<main class="container">
    <section class="form-section">
        <div class="form-container">
            <h2>Criar Nova Trilha</h2>
            <form method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label>Nome da Trilha</label>
                    <input type="text" name="nomeDaTrilha" placeholder="Ex: Engenharia de Software" required>
                </div>
                <div class="form-group">
                    <label>Semestre Atual</label>
                    <input type="number" name="semestre" min="1" max="10" value="3" required>
                </div>
                <div class="form-group">
                    <label>Descrição / Objetivo</label>
                    <textarea name="descricao" rows="5" placeholder="O que você pretende aprender nesta trilha?" required></textarea>
                </div>
                <button type="submit" class="btn-primary">Salvar Trilha</button>
            </form>
        </div>
    </section>
</main>
{% endblock %}
