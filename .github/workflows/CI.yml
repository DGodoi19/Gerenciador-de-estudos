name: Django CI

on:
  push:
    branches: [ "master", "main", "entrega-intermediaria" ]
  pull_request:
    branches: [ "master", "main", "entrega-intermediaria" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Ruff
        run: ruff check .
      - name: Run Tests
        run: pytest